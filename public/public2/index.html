<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Loja do Daniell</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">LOGO</div>
  <div class="titulo">Loja do Daniell</div>
  <nav class="menu">MENU</nav>
</header>

<main class="main">

  <section class="conteudo">

    <article class="item">
      <img src="https://picsum.photos/100">
      <p>Produto 1</p>
    </article>

    <article class="item">
      <img src="https://picsum.photos/101">
      <p>Produto 2</p>
    </article>

  </section>

  <aside class="sidebar">

    <h2>Barra lateral</h2>

    <div class="pesquisa">
      <p>Pesquisa:</p>
      <input type="text">
    </div>

    <div class="categorias">
      <p>Categorias:</p>
      <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
      </ul>
    </div>

  </aside>

</main>

<footer class="footer">
  <p>© Daniell</p>
</footer>

</body>
</html>
